<svg width="850" height="60" viewBox="0 0 850 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="reveal">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" from="0" to="850" dur="4.0s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>
  <style>
    .text {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 24px;
      fill: #3386FF;
    }
  </style>
  <text x="0" y="40" class="text" clip-path="url(#reveal)">Full-Stack Developer en evolución | Frontend · Backend · Testing</text>
</svg>
