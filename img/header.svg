<svg width="850" height="60" viewBox="0 0 850 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes slideUp {
      0% {
        transform: translateY(30px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }
    .text {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 24px;
      fill: #3386FF;
      animation: slideUp 3.0s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>
  <text x="0" y="40" class="text">Full-Stack Developer en evolución | Frontend · Backend · Testing</text>
</svg>
